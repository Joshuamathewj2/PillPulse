<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
</head>
<body>
  <div id="output"></div>
  <script>
    const svgStr = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
    <defs>
        <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#b4a4ff"/>
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#8d82d8" flood-opacity="0.8"/>
        </filter>
        <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#3c306e"/>
            <stop offset="100%" stop-color="#141417"/>
        </radialGradient>
    </defs>
    <rect x="0" y="0" width="128" height="128" rx="28" fill="url(#bgGrad)"/>
    <rect x="0" y="0" width="128" height="128" rx="28" fill="transparent" stroke="#5a5a72" stroke-width="2"/>
    <path d="M64 24 L100 40 V68 C100 90 64 108 64 108 C64 108 28 90 28 68 V40 L64 24 Z" fill="none" stroke="url(#shieldGrad)" stroke-width="4" filter="url(#glow)"/>
    <circle cx="64" cy="64" r="12" fill="#ffffff" filter="url(#glow)"/>
    <circle cx="64" cy="64" r="22" fill="none" stroke="rgba(180,164,255,0.6)" stroke-width="1.5" stroke-dasharray="4 4" />
</svg>`;

    const blob = new Blob([svgStr], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const img = new Image();
    
    img.onload = () => {
      const sizes = [16, 32, 48, 128];
      let outputHTML = '';
      
      sizes.forEach(size => {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, size, size);
        const b64 = canvas.toDataURL('image/png');
        outputHTML += `<h3>Size ${size}</h3><textarea id="b64-${size}">${b64}</textarea><br>`;
      });
      
      document.getElementById('output').innerHTML = outputHTML;
      const readyObj = document.createElement('div');
      readyObj.id = 'READY';
      document.body.appendChild(readyObj);
    };
    
    img.src = url;
  </script>
</body>
</html>
