<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus Shield — Site Blocked</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&family=JetBrains+Mono:wght@500;700;800&display=swap');

    :root {
      --bg: #0d0d0f;
      --surface: #141417;
      --border: #2a2a32;
      --accent: #7c6fcd;
      --accent-glow: rgba(124,111,205,.4);
      --text: #e8e8f0;
      --text-muted: #5a5a72;
      --red: #e05c5c;
      --font-body: 'Inter', sans-serif;
      --font-heading: 'Outfit', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: .25;
      pointer-events: none;
    }

    /* Glow orb */
    body::after {
      content: '';
      position: fixed;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      pointer-events: none;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: .5; transform: translate(-50%, -50%) scale(1); }
      50%       { opacity: .8; transform: translate(-50%, -50%) scale(1.1); }
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 52px;
      text-align: center;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 0 60px rgba(0,0,0,.6), 0 0 30px var(--accent-glow);
      animation: slideUp .5s cubic-bezier(.16,1,.3,1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .shield {
      font-size: 56px;
      margin-bottom: 20px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }

    h1 {
      font-family: var(--font-heading);
      font-size: 32px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
      margin-bottom: 10px;
    }

    h1 span { color: var(--accent); }

    .blocked-domain {
      display: inline-block;
      background: rgba(224,92,92,.12);
      border: 1px solid rgba(224,92,92,.3);
      color: var(--red);
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font-mono);
      margin: 12px 0 16px;
      letter-spacing: .5px;
      word-break: break-all;
    }

    p {
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.7;
      margin-bottom: 28px;
    }

    /* Motivational quote — swaps on each load */
    .quote {
      border-left: 3px solid var(--accent);
      padding: 10px 16px;
      text-align: left;
      background: rgba(124,111,205,.07);
      border-radius: 0 6px 6px 0;
      margin-bottom: 28px;
      font-size: 12px;
      color: var(--text);
      font-style: italic;
      line-height: 1.6;
    }
    .quote-author {
      display: block;
      margin-top: 6px;
      color: var(--accent);
      font-style: normal;
      font-size: 10px;
      letter-spacing: 1px;
    }

    .btn-back {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all .2s;
      box-shadow: 0 0 20px var(--accent-glow);
      letter-spacing: .5px;
    }
    .btn-back:hover {
      background: #8d82d8;
      transform: translateY(-2px);
      box-shadow: 0 0 30px var(--accent-glow);
    }

    .footer-note {
      margin-top: 20px;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: .5px;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="shield">🛡</span>
    <h1>Focus <span>Shield</span></h1>

    <!-- Blocked domain is injected from the URL query string -->
    <div class="blocked-domain" id="blockedDomain">this site</div>

    <p>You tried to visit a site that's on your blocked list.<br>
    Stay locked in — your future self will thank you.</p>

    <div class="quote" id="quoteBox">
      <span id="quoteText">dont give up god is with you</span>
      <span class="quote-author" id="quoteAuthor">— Jeswin</span>
    </div>

    <button id="goBackBtn" class="btn-back">← Go Back</button>

    <div class="footer-note">Focus Shield is protecting your productivity.</div>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
